<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Spell Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="container">
        <h1>Welcome to the Magical Spell Generator!</h1>

        <h3>Spell Ingredients:</h3>
        <ul id="ingredientsList">
            <li>Dragon Scale</li>
            <li>Phoenix Feather</li>
            <li>Unicorn Horn</li>
        </ul>

        <div class="actions">
            <button id="generateButton">Generate Spell</button>
            <button id="resetButton">Reset</button>
        </div>

        <div id="spellArea">
            <span style="font-weight: normal; color: #52397c;">The spellbook is idle. Click generate!</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
